version: '3.8'

services:
  # 데이터베이스 서비스 (Oracle XE 21c)
  db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle_db
    environment:
      - ORACLE_PASSWORD=UBIG
      - APP_USER=UBIG
      - APP_USER_PASSWORD=UBIG
    ports:
      - "1522:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata

      - ./SQL:/container-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 20s
      retries: 10

  # 웹 애플리케ocation 서비스 (Spring Legacy)
  webapp:
    build:
      context: ./UBIGSemiProject
      dockerfile: Dockerfile
    container_name: spring_webapp
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod

volumes:
  oracle_data:
